<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./favicon.png?v=20260411b" />
    <link rel="shortcut icon" href="./favicon.ico?v=20260411b" />
    <title>Shelke Organic Farm</title>
    <script>
      (function () {
        var pathSegmentsToKeep = 1;
        var location = window.location;
        var redirectUrl =
          location.protocol +
          '//' +
          location.hostname +
          (location.port ? ':' + location.port : '') +
          location.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
          '/?/' +
          location.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (location.search ? '&' + location.search.slice(1).replace(/&/g, '~and~') : '') +
          location.hash;

        location.replace(redirectUrl);
      })();
    </script>
  </head>
  <body></body>
</html>
