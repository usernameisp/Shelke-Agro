<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function (location) {
        if (location.search.startsWith('?/')) {
          const decoded = location.search
            .slice(2)
            .split('&')
            .map(function (segment) {
              return segment.replace(/~and~/g, '&');
            })
            .join('?');

          const newUrl = location.pathname + decoded + location.hash;
          window.history.replaceState(null, '', newUrl);
        }
      })(window.location);
    </script>
    <link rel="icon" type="image/png" href="%BASE_URL%favicon.png" />
    <meta
      name="description"
      content="Shelke Organic Farm grows premium organic fruits with care and delivers farm-fresh harvests directly to families."
    />
    <title>Shelke Organic Farm | Premium Organic Produce</title>
  </head>
